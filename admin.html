<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e4e4e7;
            line-height: 1.6;
        }

        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #111111 100%);
        }

        .auth-card {
            background: #1a1a1a;
            border: 1px solid #27272a;
            border-radius: 8px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .auth-card h1 {
            margin-bottom: 1rem;
            color: #22c55e;
            font-size: 1.5rem;
        }

        .auth-card p {
            color: #a1a1aa;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #a1a1aa;
            font-size: 0.875rem;
        }

        input[type="password"], input[type="text"], input[type="email"], textarea, select {
            width: 100%;
            padding: 0.75rem;
            background: #111111;
            border: 1px solid #27272a;
            border-radius: 4px;
            color: #e4e4e7;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        input[type="password"]:focus, input[type="text"]:focus, input[type="email"]:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #22c55e;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: #22c55e;
            color: #0a0a0a;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #16a34a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }

        .hidden {
            display: none;
        }

        /* Admin Dashboard */
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid #27272a;
            padding-bottom: 1rem;
        }

        .admin-header h1 {
            color: #22c55e;
            font-size: 2rem;
        }

        .logout-btn {
            width: auto;
            padding: 0.5rem 1.5rem;
            background: #ef4444;
            font-size: 0.875rem;
        }

        .logout-btn:hover {
            background: #dc2626;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #27272a;
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: transparent;
            color: #a1a1aa;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            width: auto;
        }

        .tab-btn.active {
            color: #22c55e;
            border-bottom-color: #22c55e;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-container {
            background: #1a1a1a;
            border: 1px solid #27272a;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-container h2 {
            color: #22c55e;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .form-grid {
            display: grid;
            gap: 1rem;
        }

        .form-grid-2 {
            grid-template-columns: 1fr 1fr;
        }

        @media (max-width: 768px) {
            .form-grid-2 {
                grid-template-columns: 1fr;
            }

            .admin-header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }

            .logout-btn {
                width: 100%;
            }
        }

        .projects-list {
            display: grid;
            gap: 1rem;
        }

        .project-item {
            background: #111111;
            border: 1px solid #27272a;
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .project-info h3 {
            color: #e4e4e7;
            margin-bottom: 0.5rem;
        }

        .project-info p {
            color: #a1a1aa;
            font-size: 0.875rem;
        }

        .project-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-edit, .btn-delete {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: #3b82f6;
            color: white;
        }

        .btn-edit:hover {
            background: #2563eb;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        .message {
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: none;
        }

        .message.success {
            background: #22c55e;
            color: #0a0a0a;
            display: block;
        }

        .message.error {
            background: #ef4444;
            color: #fff;
            display: block;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 0.75rem;
            background: #111111;
            border: 1px solid #27272a;
            border-radius: 4px;
            cursor: pointer;
            transition: border-color 0.3s ease;
            text-align: center;
            color: #a1a1aa;
        }

        .file-input-label:hover {
            border-color: #22c55e;
        }

        .file-name {
            font-size: 0.875rem;
            color: #22c55e;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <!-- Auth Modal -->
    <div id="authContainer" class="auth-container">
        <div class="auth-card">
            <h1>🔐 Admin Panel</h1>
            <p>Enter your API key to manage portfolio content</p>
            <form id="authForm">
                <div class="form-group">
                    <label for="apiKey">API Key</label>
                    <input type="password" id="apiKey" placeholder="Enter API key" required>
                </div>
                <button type="submit">Access Admin Panel</button>
            </form>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" class="hidden">
        <div class="admin-container">
            <div class="admin-header">
                <h1>📊 Portfolio Admin</h1>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('profile')">Profile</button>
                <button class="tab-btn" onclick="switchTab('projects')">Projects</button>
            </div>

            <!-- Profile Tab -->
            <div id="profileTab" class="tab-content active">
                <div class="form-container">
                    <h2>Edit Profile Information</h2>
                    <div id="profileMessage" class="message"></div>
                    <form id="profileForm" class="form-grid">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="form-group">
                            <label for="role">Role</label>
                            <input type="text" id="role" required>
                        </div>
                        <div class="form-group">
                            <label for="tagline">Tagline</label>
                            <input type="text" id="tagline">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone</label>
                            <input type="text" id="phone">
                        </div>
                        <div class="form-group">
                            <label for="github">GitHub URL</label>
                            <input type="text" id="github">
                        </div>
                        <div class="form-group">
                            <label for="linkedin">LinkedIn URL</label>
                            <input type="text" id="linkedin">
                        </div>
                        <div class="form-group">
                            <label for="about">About Section</label>
                            <textarea id="about"></textarea>
                        </div>
                        <button type="submit" style="grid-column: 1 / -1;">Save Profile</button>
                    </form>
                </div>
            </div>

            <!-- Projects Tab -->
            <div id="projectsTab" class="tab-content">
                <div class="form-container">
                    <h2>Add New Project</h2>
                    <div id="projectMessage" class="message"></div>
                    <form id="projectForm" class="form-grid form-grid-2" enctype="multipart/form-data">
                        <div class="form-group">
                            <label for="title">Project Title</label>
                            <input type="text" id="title" required>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" required>
                                <option value="backend">Backend</option>
                                <option value="security">Security</option>
                                <option value="ctf">CTF</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea id="description" style="grid-column: 1 / -1;"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="tags">Tags (comma-separated)</label>
                            <input type="text" id="tags" placeholder="Node.js, Express, PostgreSQL">
                        </div>
                        <div class="form-group">
                            <label for="githubUrl">GitHub URL</label>
                            <input type="text" id="githubUrl">
                        </div>
                        <div class="form-group">
                            <label for="liveUrl">Live URL</label>
                            <input type="text" id="liveUrl">
                        </div>
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label>Project Image</label>
                            <div class="file-input-wrapper">
                                <input type="file" id="image" accept="image/*">
                                <label for="image" class="file-input-label">Click to select image</label>
                                <div class="file-name" id="fileName"></div>
                            </div>
                        </div>
                        <button type="submit" style="grid-column: 1 / -1;">Add Project</button>
                    </form>
                </div>

                <div>
                    <h2 style="color: #22c55e; margin-bottom: 1.5rem;">Your Projects</h2>
                    <div id="projectsList" class="projects-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let apiKey = localStorage.getItem('apiKey');
        const API_BASE = window.location.origin;

        // Check if already authenticated
        if (apiKey) {
            showDashboard();
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            apiKey = document.getElementById('apiKey').value;
            
            // Try to authenticate by fetching profile
            try {
                const response = await fetch(`${API_BASE}/api/profile`, {
                    headers: { 'X-API-Key': apiKey }
                });
                
                if (response.ok) {
                    localStorage.setItem('apiKey', apiKey);
                    showDashboard();
                } else {
                    alert('Invalid API key');
                }
            } catch (error) {
                alert('Connection error: ' + error.message);
            }
        });

        function showDashboard() {
            document.getElementById('authContainer').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
            loadProfile();
            loadProjects();
        }

        function logout() {
            localStorage.removeItem('apiKey');
            apiKey = null;
            document.getElementById('authContainer').classList.remove('hidden');
            document.getElementById('adminDashboard').classList.add('hidden');
            document.getElementById('authForm').reset();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            event.target.classList.add('active');
        }

        // Profile Management
        async function loadProfile() {
            try {
                const response = await fetch(`${API_BASE}/api/profile`);
                const profile = await response.json();
                
                document.getElementById('name').value = profile.name || '';
                document.getElementById('role').value = profile.role || '';
                document.getElementById('tagline').value = profile.tagline || '';
                document.getElementById('email').value = profile.email || '';
                document.getElementById('phone').value = profile.phone || '';
                document.getElementById('github').value = profile.github_url || '';
                document.getElementById('linkedin').value = profile.linkedin_url || '';
                document.getElementById('about').value = profile.about || '';
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const profileData = {
                name: document.getElementById('name').value,
                role: document.getElementById('role').value,
                tagline: document.getElementById('tagline').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                github_url: document.getElementById('github').value,
                linkedin_url: document.getElementById('linkedin').value,
                about: document.getElementById('about').value
            };

            try {
                const response = await fetch(`${API_BASE}/api/profile`, {
                    method: 'PUT',
                    headers: {
                        'X-API-Key': apiKey,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(profileData)
                });

                const messageEl = document.getElementById('profileMessage');
                if (response.ok) {
                    messageEl.className = 'message success';
                    messageEl.textContent = '✓ Profile updated successfully!';
                } else {
                    messageEl.className = 'message error';
                    messageEl.textContent = '✗ Failed to update profile';
                }
                setTimeout(() => messageEl.classList.remove('success', 'error'), 3000);
            } catch (error) {
                console.error('Error:', error);
            }
        });

        // Projects Management
        async function loadProjects() {
            try {
                const response = await fetch(`${API_BASE}/api/projects`);
                const projects = await response.json();
                const projectsList = document.getElementById('projectsList');
                
                if (projects.length === 0) {
                    projectsList.innerHTML = '<p style="color: #a1a1aa;">No projects yet. Add one above!</p>';
                    return;
                }

                projectsList.innerHTML = projects.map(project => `
                    <div class="project-item">
                        <div class="project-info">
                            <h3>${project.title}</h3>
                            <p>${project.category.toUpperCase()} • ${project.tags || ''}</p>
                        </div>
                        <div class="project-actions">
                            <button class="btn-edit" onclick="editProject(${project.id})">Edit</button>
                            <button class="btn-delete" onclick="deleteProject(${project.id})">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading projects:', error);
            }
        }

        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('tags', document.getElementById('tags').value);
            formData.append('github_url', document.getElementById('githubUrl').value);
            formData.append('live_url', document.getElementById('liveUrl').value);
            
            const imageFile = document.getElementById('image').files[0];
            if (imageFile) {
                formData.append('image', imageFile);
            }

            try {
                const response = await fetch(`${API_BASE}/api/projects`, {
                    method: 'POST',
                    headers: { 'X-API-Key': apiKey },
                    body: formData
                });

                const messageEl = document.getElementById('projectMessage');
                if (response.ok) {
                    messageEl.className = 'message success';
                    messageEl.textContent = '✓ Project added successfully!';
                    document.getElementById('projectForm').reset();
                    document.getElementById('fileName').textContent = '';
                    loadProjects();
                } else {
                    messageEl.className = 'message error';
                    messageEl.textContent = '✗ Failed to add project';
                }
                setTimeout(() => messageEl.classList.remove('success', 'error'), 3000);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('projectMessage').className = 'message error';
                document.getElementById('projectMessage').textContent = '✗ Error: ' + error.message;
            }
        });

        async function deleteProject(id) {
            if (!confirm('Are you sure you want to delete this project?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/projects/${id}`, {
                    method: 'DELETE',
                    headers: { 'X-API-Key': apiKey }
                });

                if (response.ok) {
                    loadProjects();
                    document.getElementById('projectMessage').className = 'message success';
                    document.getElementById('projectMessage').textContent = '✓ Project deleted!';
                } else {
                    alert('Failed to delete project');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function editProject(id) {
            alert('Edit project feature coming soon!');
        }

        // File input display name
        document.getElementById('image').addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name || '';
            document.getElementById('fileName').textContent = fileName ? `📁 ${fileName}` : '';
        });
    </script>
</body>
</html>
